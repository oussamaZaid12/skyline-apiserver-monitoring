name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build --no-cache -t skyline-apiserver-monitoring:final .

    - name: Save image
      run: docker save skyline-apiserver-monitoring:final | gzip > skyline-apiserver.tar.gz

    - name: Transfer image
      uses: appleboy/scp-action@v0.1.4
      with:
        host: ${{ secrets.ALLINONE_HOST }}
        username: ${{ secrets.ALLINONE_USER }}
        key: ${{ secrets.ALLINONE_SSH_KEY }}
        source: skyline-apiserver.tar.gz
        target: /tmp/

    - name: Deploy
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.ALLINONE_HOST }}
        username: ${{ secrets.ALLINONE_USER }}
        key: ${{ secrets.ALLINONE_SSH_KEY }}
        script: |
          sudo docker load < /tmp/skyline-apiserver.tar.gz
          sudo docker stop skyline_apiserver 2>/dev/null || true
          sudo docker rm skyline_apiserver 2>/dev/null || true
          sudo docker run -d --name skyline_apiserver --network host \
            -e KOLLA_CONFIG_STRATEGY=COPY_ALWAYS \
            -v /etc/kolla/skyline-apiserver/config.json:/var/lib/kolla/config_files/config.json \
            -v /etc/kolla/skyline-apiserver/skyline.yaml:/var/lib/kolla/config_files/skyline.yaml \
            -v /etc/kolla/skyline-apiserver/gunicorn.py:/var/lib/kolla/config_files/gunicorn.py \
            skyline-apiserver-monitoring:final kolla_start
